<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>列印筆記 - {{ note.title }}</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 2rem auto; color: #333; padding: 0 2rem; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 0.5rem; margin-bottom: 2rem; }
        .meta { color: #666; font-size: 0.9em; margin-bottom: 2rem; }
        img { max-width: 100%; height: auto; }
        blockquote { border-left: 4px solid #ccc; padding-left: 1rem; color: #555; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; }
        @media print {
            .no-print { display: none; }
        }
        .btn { padding: 0.5rem 1rem; background: #4f46e5; color: white; text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 1rem; cursor: pointer; border: none; font-size: 1rem;}
    </style>
</head>
<body>
    <div class="no-print" style="text-align: right;">
        <button onclick="window.print()" class="btn">列印本頁</button>
        <a href="javascript:history.back()" style="margin-left: 1rem; color: #666;">返回</a>
    </div>

    <h1>{{ note.title }}</h1>
    <div class="meta">
        科目: {{ note.subject.name }} | 匯出日期: <span id="exportDate"></span>
    </div>

    <div class="content">
        {{ note.content | safe }}
    </div>

    <script>
        document.getElementById('exportDate').innerText = new Date().toLocaleDateString();
        // Option to print immediately on loading:
        // window.onload = function() { window.print(); }
    </script>
</body>
</html>
