{% extends "base.html" %}
{% block title %}新增筆記 - {{ subject.name }}{% endblock %}

{% block head %}
<!-- Include Quill stylesheet -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex align-center gap-2 mb-4">
    <a href="{{ url_for('subjects.subject_detail', subject_id=subject.id) }}" class="btn btn-icon btn-secondary">
        <i class='bx bx-arrow-back'></i>
    </a>
    <h2>🖋️ 在 {{ subject.name }} 中新增筆記</h2>
</div>

<div class="glass-panel" style="padding: 1.5rem;">
    <form action="{{ url_for('notes.create_note', subject_id=subject.id) }}" method="POST">
        <div class="form-group">
            <label for="title" class="form-label" style="font-size: 1.1rem;">筆記標題</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="輸入標題..." required autofocus style="font-size: 1.2rem; padding: 1rem;">
        </div>
        
        <div class="form-group mt-4">
            <label class="form-label mb-2" style="font-size: 1.1rem;">筆記內容</label>
            <div id="editor"></div>
            <!-- Hidden input to hold quill content -->
            <input type="hidden" name="content" id="hidden-content">
        </div>
        
        <div class="d-flex justify-between mt-4">
            <a href="{{ url_for('subjects.subject_detail', subject_id=subject.id) }}" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> 儲存筆記</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
