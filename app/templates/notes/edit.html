{% extends "base.html" %}
{% block title %}編輯 - {{ note.title }}{% endblock %}

{% block head %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex align-center gap-2 mb-4">
    <a href="{{ url_for('notes.view_note', note_id=note.id) }}" class="btn btn-icon btn-secondary">
        <i class='bx bx-arrow-back'></i>
    </a>
    <h2>✏️ 編輯筆記</h2>
</div>

<div class="glass-panel" style="padding: 1.5rem;">
    <form action="{{ url_for('notes.edit_note', note_id=note.id) }}" method="POST">
        <div class="form-group">
            <label for="title" class="form-label" style="font-size: 1.1rem;">筆記標題</label>
            <input type="text" id="title" name="title" class="form-control" value="{{ note.title }}" required style="font-size: 1.2rem; padding: 1rem;">
        </div>
        
        <div class="form-group mt-4">
            <label class="form-label mb-2" style="font-size: 1.1rem;">筆記內容</label>
            <!-- 預先載入現有 HTML 至編輯器容器中 -->
            <div id="editor">{{ note.content | safe }}</div>
            <input type="hidden" name="content" id="hidden-content">
        </div>
        
        <div class="d-flex justify-between mt-4">
            <a href="{{ url_for('notes.view_note', note_id=note.id) }}" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> 更新儲存</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
